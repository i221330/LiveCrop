season:
  start_month: 5       # May 1
  length_days: 150     # through Sep 27

zones:
  num_zones: 4
  root_zone_depth_mm: 600
  field_capacity_theta: 0.35     # volumetric water content at field capacity
  wilting_point_theta: 0.10      # volumetric water content at wilting point
  saturation_theta: 0.45         # above this = waterlogged
  initial_moisture_theta: 0.25   # mean start-of-season moisture
  zone_moisture_noise_fraction: 0.15  # ±15% per-zone variation at reset (heterogeneous field)

action:
  water_levels_mm: [0, 5, 15, 25]
  daily_budget_mm: 30            # scarce budget (~7.5 mm/zone avg) — below peak ET, crops stress without smart allocation

reward:
  water_cost_per_mm: 0.01
  stress_penalty_weight: 1.0
  waterlogging_penalty_weight: 1.0
  yield_bonus_weight: 10.0

forecast:
  horizon_days: 3

crop:
  ky_sensitivity: 0.4            # FAO-33 overall yield response factor
  # Kc piecewise-linear over season (day, Kc)
  kc_stages:
    - [0, 0.4]
    - [20, 0.4]
    - [50, 1.15]
    - [100, 1.15]
    - [150, 0.6]
