# Stable-Baselines3 hyperparameters for Irrigation-v0.
# Episodes are exactly 150 steps, so on-policy n_steps aligns to one season.
# Tune here first; agents/train.py reads these on startup.

dqn:
  learning_rate: 1.0e-4
  buffer_size: 100000
  learning_starts: 1500
  batch_size: 64
  gamma: 0.99
  exploration_fraction: 0.30
  exploration_final_eps: 0.05
  target_update_interval: 500
  train_freq: 4
  gradient_steps: 1

ppo:
  learning_rate: 3.0e-4
  n_steps: 150        # one full season per rollout
  batch_size: 150
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.01
  clip_range: 0.20

a2c:
  learning_rate: 3.0e-4
  n_steps: 150
  gamma: 0.99
  gae_lambda: 0.95
  ent_coef: 0.01
